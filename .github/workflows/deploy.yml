name: Deploy to Salesforce Org

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      
      - name: Set up Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Check If CLI Installed
        run: sf version
      
      - name: Create server key
        run: echo "${{secrets.SF_JWT_KEY}}" > server.key
      
      - name: Authorize to org
        run: sf org login jwt --client-id ${{secrets.SF_CONSUMER_KEY}} --jwt-key-file server.key --username ${{secrets.SF_USERNAME}} --instance-url ${{secrets.SF_INSTANCE_URL}}
      
      - name: Deploy Metadata
        run: sf project deploy start --manifest=manifest/package.xml --target-org ${{secrets.SF_USERNAME}}
          